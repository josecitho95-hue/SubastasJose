name: CD - Deploy to VPS

on:
  # NOTE: Reactivar push trigger cuando la VPS de Vultr esté lista.
  # push:
  #   branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          set -e
          echo "🚀 Iniciando deploy..."

          cd /opt/subastas || exit 1

          # Backup de la base de datos antes del deploy
          echo "💾 Creando backup de base de datos..."
          mkdir -p backups
          docker compose exec -T db pg_dump -U subastas subastas > backups/backup_$(date +%Y%m%d_%H%M%S).sql || true

          # Pull de últimos cambios
          echo "📥 Actualizando código..."
          git fetch origin
          git reset --hard origin/main

          # Reconstruir y levantar contenedores (minimize downtime)
          echo "🐳 Reconstruyendo contenedores..."
          docker compose build
          docker compose down
          docker compose up -d

          # Esperar a que la base de datos esté REALMENTE lista (robusto)
          echo "⏳ Esperando base de datos..."
          for i in $(seq 1 30); do
            if docker compose exec -T db pg_isready -U subastas -d subastas > /dev/null 2>&1; then
              echo "✅ Base de datos lista (intento $i)"
              break
            fi
            echo "   Intento $i/30 — esperando 2s..."
            sleep 2
            if [ "$i" -eq 30 ]; then
              echo "❌ Timeout esperando base de datos"
              exit 1
            fi
          done

          # Ejecutar migraciones
          echo "🗄️ Ejecutando migraciones..."
          docker compose exec -T api alembic upgrade head

          # Health check robusto (max 60s)
          echo "🏥 Verificando salud de la API..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost/api/health > /dev/null 2>&1; then
              echo "✅ API healthy (intento $i)"
              break
            fi
            echo "   Intento $i/12 — esperando 5s..."
            sleep 5
            if [ "$i" -eq 12 ]; then
              echo "❌ API no responde tras 60s — rollback"
              docker compose down
              exit 1
            fi
          done

          # Limpiar imágenes viejas
          echo "🧹 Limpiando imágenes no usadas..."
          docker image prune -f

          echo "✅ Deploy completado exitosamente!"

    - name: Notify on failure
      if: failure()
      uses: slackapi/slack-github-action@v1.24.0
      with:
        payload: |
          {
            "text": "❌ Deploy fallido: ${{ github.repository }}\nCommit: ${{ github.sha }}\nAutor: ${{ github.actor }}"
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

