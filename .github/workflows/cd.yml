name: CD - Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          set -e
          echo "🚀 Iniciando deploy..."

          cd /opt/subastas || exit 1

          # Backup de la base de datos antes del deploy
          echo "💾 Creando backup..."
          docker compose exec -T db pg_dump -U subastas subastas > backups/backup_$(date +%Y%m%d_%H%M%S).sql || true

          # Pull de últimos cambios
          echo "📥 Actualizando código..."
          git fetch origin
          git reset --hard origin/main

          # Levantar servicios
          echo "🐳 Reconstruyendo contenedores..."
          docker compose down
          docker compose pull
          docker compose up -d --build

          # Esperar a que la base de datos esté lista
          echo "⏳ Esperando base de datos..."
          sleep 10

          # Ejecutar migraciones
          echo "🗄️ Ejecutando migraciones..."
          docker compose exec -T api alembic upgrade head

          # Limpiar imágenes viejas
          echo "🧹 Limpiando..."
          docker system prune -f

          # Health check
          echo "🏥 Verificando salud..."
          sleep 5
          curl -sf http://localhost/api/health || exit 1

          echo "✅ Deploy completado exitosamente!"

    - name: Notify on failure
      if: failure()
      uses: slackapi/slack-github-action@v1.24.0
      with:
        payload: |
          {
            "text": "❌ Deploy fallido: ${{ github.repository }}\nCommit: ${{ github.sha }}\nAutor: ${{ github.actor }}"
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
